<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お給仕予定 | MS Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Shippori+Mincho+B1:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}

/* ===== TOKENS ===== */
:root{
  /* Store colors */
  --L:#5bcce8;   /* Linaria  水色 */
  --L-dim:rgba(91,204,232,.18);
  --M:#f040b0;   /* I's Melty ピンク */
  --M-dim:rgba(240,64,176,.18);
  --Y:#b0a8d0;   /* Lily Maid グレー */
  --Y-dim:rgba(176,168,208,.18);
  /* Page */
  --page:#07050d;
  --surface:#0d0b1a;
  --surface2:#131028;
  --border:rgba(255,255,255,.07);
  --border-pink:rgba(220,80,180,.13);
  --text:rgba(255,255,255,.90);
  --muted:rgba(255,255,255,.38);
  /* Day highlight */
  --today-bg:rgba(255,210,80,.08);
  --sat-bg:rgba(80,150,255,.07);
  --sun-bg:rgba(255,80,80,.07);
  --fri-bg:rgba(160,255,80,.05);
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--page);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
}

/* =====================================================
   HEADER
===================================================== */
header{
  position:sticky;
  top:0;
  z-index:200;
  background:var(--page);
}

/* — Logo band — */
.logo-band{
  background:linear-gradient(160deg,#0a0615 0%,#14092a 60%,#080516 100%);
  padding:10px 16px 9px;
  text-align:center;
  border-bottom:1px solid var(--border-pink);
  position:relative;
  overflow:hidden;
}
.logo-band::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(240,64,176,.6),transparent);
}
/* Real logo (ms-logo.png — white pill background for dark bg) */
.ms-logo{
  height:48px;
  width:auto;
  display:block;
  margin:0 auto 2px;
  object-fit:contain;
  background:rgba(255,255,255,.92);
  border-radius:8px;
  padding:4px 10px;
}
/* CSS fallback if image missing */
.ms-logo-fallback{
  display:none;
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  font-weight:700;
  letter-spacing:6px;
  color:rgba(255,255,255,.92);
  margin-bottom:2px;
  line-height:1;
}
.header-title{
  font-family:'Shippori Mincho B1',serif;
  font-size:13px;
  font-weight:400;
  letter-spacing:5px;
  color:rgba(255,255,255,.55);
  margin-top:1px;
}
.header-period{
  font-size:10px;
  letter-spacing:2px;
  color:rgba(200,130,255,.5);
  margin-top:4px;
}

/* — Filter tabs — */
.filter-row{
  display:flex;
  background:#080614;
  padding:7px 10px;
  gap:6px;
  border-bottom:1px solid var(--border-pink);
}
.ftab{
  flex:1;
  padding:5px 4px;
  border:1.5px solid rgba(255,255,255,.11);
  border-radius:22px;
  font-size:10px;
  font-family:'Noto Sans JP',sans-serif;
  font-weight:700;
  background:rgba(255,255,255,.02);
  color:rgba(255,255,255,.4);
  cursor:pointer;
  white-space:nowrap;
  transition:all .2s;
  -webkit-tap-highlight-color:transparent;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  min-height:44px;
}
.ftab-logo{
  height:20px;width:auto;max-width:64px;
  object-fit:contain;
  filter:brightness(.78) saturate(.85);
  transition:filter .2s;
}
.ftab-name{
  font-size:9px;
  font-weight:700;
  letter-spacing:.5px;
  opacity:.6;
  line-height:1;
}
.ftab.is-all              {font-size:12px;font-weight:700}
.ftab.is-all.active       {background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.45);color:#fff}
.ftab.is-L                {border-color:rgba(91,204,232,.22);color:rgba(91,204,232,.6)}
.ftab.is-L.active         {background:var(--L-dim);border-color:var(--L);box-shadow:0 0 12px rgba(91,204,232,.18);color:var(--L)}
.ftab.is-L.active .ftab-logo {filter:brightness(1.1) saturate(1.2) drop-shadow(0 0 4px var(--L))}
.ftab.is-L.active .ftab-name {opacity:1}
.ftab.is-M                {border-color:rgba(240,64,176,.22);color:rgba(240,64,176,.6)}
.ftab.is-M.active         {background:var(--M-dim);border-color:var(--M);box-shadow:0 0 12px rgba(240,64,176,.18);color:var(--M)}
.ftab.is-M.active .ftab-logo {filter:brightness(1.1) saturate(1.2) drop-shadow(0 0 4px var(--M))}
.ftab.is-M.active .ftab-name {opacity:1}
.ftab.is-Y                {border-color:rgba(176,168,208,.22);color:rgba(176,168,208,.6)}
.ftab.is-Y .ftab-logo     {filter:brightness(0) invert(1) opacity(.65)}
.ftab.is-Y.active         {background:var(--Y-dim);border-color:var(--Y);box-shadow:0 0 12px rgba(176,168,208,.18);color:var(--Y)}
.ftab.is-Y.active .ftab-logo {filter:brightness(0) invert(1) drop-shadow(0 0 4px var(--Y))}
.ftab.is-Y.active .ftab-name {opacity:1}

/* — Period nav — */
.nav-row{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#070510;
  padding:6px 12px;
  gap:16px;
  border-bottom:1px solid rgba(200,80,200,.09);
}
.nav-btn{
  width:36px;height:36px;
  border:1px solid rgba(240,64,176,.22);
  border-radius:50%;
  background:rgba(240,64,176,.05);
  color:rgba(255,200,240,.8);
  font-size:22px;line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s;
  flex-shrink:0;
}
.nav-btn:active{background:rgba(240,64,176,.18)}
#navLabel{
  font-size:14px;font-weight:700;
  color:rgba(255,230,255,.88);
  letter-spacing:1px;
  min-width:130px;text-align:center;
}

/* =====================================================
   TODAY PANEL
===================================================== */
.today-panel{
  display:none;
  background:linear-gradient(180deg,rgba(240,64,176,.07) 0%,transparent 100%);
  border-bottom:1px solid rgba(240,64,176,.14);
  padding:10px 12px 11px;
}
.today-panel.visible{display:block}
.today-head{
  font-size:10px;font-weight:700;
  letter-spacing:2px;
  color:rgba(255,160,220,.75);
  margin-bottom:8px;
  display:flex;align-items:center;gap:5px;
}
.today-head::before{content:'♡';font-size:13px;color:rgba(240,80,180,.7)}
.today-chips{
  display:flex;gap:7px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:2px;
  scrollbar-width:none;
}
.today-chips::-webkit-scrollbar{display:none}
.tc{
  display:inline-flex;align-items:center;
  gap:6px;
  background:var(--surface2);
  border-radius:24px;
  padding:5px 11px 5px 5px;
  white-space:nowrap;flex-shrink:0;
}
.tc.tc-L{border:1.5px solid rgba(91,204,232,.35);background:rgba(91,204,232,.07)}
.tc.tc-M{border:1.5px solid rgba(240,64,176,.35);background:rgba(240,64,176,.07)}
.tc.tc-Y{border:1.5px solid rgba(176,168,208,.35);background:rgba(176,168,208,.07)}
.tc-photo{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(255,255,255,.2)}
.tc-nophoto{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.09);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.12)}
.tc-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.92)}
.tc-name a{color:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.tc-name a::after{content:'𝕏';font-size:9px;opacity:.45;flex-shrink:0}
.tc-name a:hover{opacity:.8}
.tc-time{font-size:10px;color:rgba(255,255,255,.42);margin-left:1px}
.tc-slogo{height:14px;width:auto;max-width:36px;object-fit:contain;opacity:.6;flex-shrink:0}

/* =====================================================
   STATUS BAR
===================================================== */
.status-bar{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  min-height:26px;
}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sdot.ok{background:#4caf50}
.sdot.ld{background:#2196f3;animation:blink .9s infinite}
.sdot.err{background:#f44336}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#stxt{font-size:10px;color:var(--muted)}
#supdated{font-size:10px;color:var(--muted);margin-left:auto;opacity:.5}

/* =====================================================
   SHIFT TABLE
===================================================== */
.table-wrap{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:var(--surface);
}
.table-wrap::-webkit-scrollbar{height:3px}
.table-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}
table{border-collapse:collapse;white-space:nowrap;width:100%}

/* Sticky name column */
thead th:first-child,
tbody td:first-child{
  position:sticky;left:0;z-index:10;
  background:var(--surface);
}
thead th:first-child{background:#0d0b1a;z-index:11}

/* Header rows */
thead th{padding:0;border-bottom:1px solid var(--border);font-weight:400}
#dRow th:first-child{
  min-width:92px;max-width:92px;
  padding:0 4px;font-size:11px;font-weight:700;color:var(--muted);
  vertical-align:middle;border-right:1px solid rgba(200,80,200,.12);
  text-align:center;height:26px;
}
#wRow th:first-child{border-right:1px solid rgba(200,80,200,.12);height:18px}

.th-date{min-width:38px;width:38px}
.th-d{height:26px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.62)}
.th-w{height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,.28)}

/* Column colors */
.col-sun .th-d,.col-sun .th-w{color:rgba(255,100,100,.8)}
.col-sat .th-d,.col-sat .th-w{color:rgba(100,160,255,.8)}
.col-fri .th-d,.col-fri .th-w{color:rgba(160,255,80,.7)}
.col-today .th-d{color:#fff;font-weight:700}
.col-today .th-d > span{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,210,80,.28);border:1px solid rgba(255,210,80,.55);
}
.wk-sep{border-left:1.5px dashed rgba(120,80,200,.18)!important}

/* Body rows */
tbody tr{border-bottom:1px solid rgba(255,255,255,.035);transition:opacity .15s}
tbody tr.rh{display:none}
tbody td:first-child{
  padding:0 6px 0 8px;
  font-size:12px;font-weight:500;
  color:rgba(255,230,255,.88);
  height:42px;min-width:92px;max-width:92px;
  overflow:hidden;border-right:1px solid rgba(200,80,200,.1);
}
tbody td{padding:2px 1px;text-align:center;vertical-align:middle;height:42px}

/* Cast name cell */
.cast-cell{display:flex;align-items:center;gap:4px;overflow:hidden}
.c-photo{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(240,64,176,.28)}
.c-nophoto{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.09);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.12)}
.c-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.c-name a{color:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.c-name a::after{content:'𝕏';font-size:8px;opacity:.45;flex-shrink:0}
.c-name a:hover{opacity:.8}
.c-name a:hover::after{opacity:.8}

/* Day highlight */
tbody td.cd-today{background:var(--today-bg)}
tbody td.cd-sat{background:var(--sat-bg)}
tbody td.cd-sun{background:var(--sun-bg)}
tbody td.cd-fri{background:var(--fri-bg)}

/* Shift badge */
.shift{
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:14px;padding:3px 6px;
  font-size:9.5px;font-weight:700;
  white-space:nowrap;min-width:32px;
  letter-spacing:0;
}
.shift.dm{opacity:.14}
.shift-L{background:rgba(91,204,232,.15);color:var(--L);border:1px solid rgba(91,204,232,.38)}
.shift-M{background:rgba(240,64,176,.15);color:var(--M);border:1px solid rgba(240,64,176,.38)}
.shift-Y{background:rgba(176,168,208,.15);color:var(--Y);border:1px solid rgba(176,168,208,.38)}

/* =====================================================
   BOTTOM
===================================================== */
.bottom-section{
  padding:16px 14px 36px;
  background:var(--surface);
  border-top:1px solid rgba(200,80,200,.1);
  display:flex;flex-direction:column;gap:16px;
}
.ev-card{
  background:var(--surface2);
  border:1px solid rgba(200,80,200,.1);
  border-radius:14px;
  padding:14px 16px;
}
.ev-head{
  font-family:'Shippori Mincho B1',serif;
  font-size:13px;font-weight:700;
  color:rgba(220,140,255,.75);
  margin-bottom:10px;letter-spacing:2px;
}
#evList{list-style:none;display:flex;flex-direction:column;gap:6px}
#evList li{font-size:12px;color:var(--text);display:flex;gap:8px;align-items:baseline}
.ev-date{color:rgba(240,140,255,.75);font-size:11px;font-weight:700;white-space:nowrap}
.legend{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.lg-item{
  display:flex;align-items:center;padding:6px 12px;
  border-radius:20px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}
.lg-item.lg-L{border-color:rgba(91,204,232,.22)}
.lg-item.lg-M{border-color:rgba(240,64,176,.22)}
.lg-item.lg-Y{border-color:rgba(176,168,208,.22)}
.lg-logo{height:20px;width:auto;max-width:70px;object-fit:contain;filter:brightness(.9)}
.lg-item.lg-Y .lg-logo{filter:brightness(0) invert(1) opacity(.8)}

/* =====================================================
   COMPACT MODE
===================================================== */
.cmp-btn{
  position:fixed;bottom:20px;right:16px;z-index:300;
  display:flex;align-items:center;gap:5px;
  padding:7px 13px 7px 10px;
  border-radius:22px;
  background:rgba(20,10,36,.9);
  border:1.5px solid rgba(240,64,176,.35);
  color:rgba(255,200,240,.8);
  font-size:11px;font-weight:700;
  cursor:pointer;
  box-shadow:0 2px 14px rgba(0,0,0,.4);
  -webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(8px);
  transition:all .15s;
}
.cmp-btn:active{background:rgba(240,64,176,.25)}
.cmp-btn.on{border-color:rgba(240,64,176,.75);background:rgba(240,64,176,.15);color:#fff}
.cmp-btn .cmp-icon{font-size:13px;line-height:1}

/* Compact mode overrides */
body.compact tbody td:first-child{min-width:58px;max-width:58px;padding:0 3px 0 6px}
body.compact .c-photo,body.compact .c-nophoto{display:none}
body.compact .c-name{font-size:10px;font-weight:700}
body.compact .cast-cell{justify-content:flex-start}
body.compact .th-date{min-width:28px;width:28px}
body.compact .th-d{font-size:9.5px;height:20px}
body.compact .th-w{font-size:8px;height:13px}
body.compact #dRow th:first-child{min-width:58px;max-width:58px;height:20px}
body.compact #wRow th:first-child{height:13px}
body.compact tbody td{height:27px;padding:1px 0}
body.compact tbody td:first-child{height:27px}
body.compact .shift{font-size:7.5px;padding:2px 3px;min-width:22px;border-radius:7px;letter-spacing:-.3px}

/* =====================================================
   DESKTOP
===================================================== */
@media(min-width:640px){
  .logo-band{padding:12px 20px 10px}
  .ms-logo{height:60px}
  .header-title{font-size:14px;letter-spacing:6px}
  .filter-row{padding:8px 16px;gap:8px}
  .ftab{min-height:48px}
  .ftab-logo{height:24px;max-width:78px}
  .ftab.is-all{font-size:13px}
  .ftab-name{font-size:10px}
  #navLabel{font-size:15px}
  .th-date{min-width:44px;width:44px}
  .th-d{font-size:13px;height:28px}
  .th-w{font-size:10px;height:20px}
  #dRow th:first-child{min-width:95px;max-width:95px;height:28px}
  #wRow th:first-child{height:20px}
  tbody td:first-child{min-width:95px;max-width:95px;height:46px}
  tbody td{height:46px}
  .c-photo,.c-nophoto{width:30px;height:30px}
  .c-name{font-size:13px}
  .shift{font-size:11px;padding:3px 7px;min-width:38px}
  .tc-photo,.tc-nophoto{width:40px;height:40px}
  .tc-name{font-size:14px}
  .bottom-section{flex-direction:row;flex-wrap:wrap}
  .ev-card{flex:1;min-width:260px}
  .legend{flex:1;justify-content:flex-end}
}
</style>
</head>
<body>

<header>
  <div class="logo-band">
    <img class="ms-logo" src="ms-logo.png" alt="MS Group"
         onerror="this.style.display='none';document.querySelector('.ms-logo-fallback').style.display='block'">
    <div class="ms-logo-fallback">MS<span style="font-size:.55em;letter-spacing:4px;display:block;font-weight:400;margin-top:2px">GROUP</span></div>
    <div class="header-title">お 給 仕 予 定</div>
    <div class="header-period" id="titlePeriod"></div>
  </div>

  <div class="filter-row">
    <button class="ftab is-all active" onclick="setFilter('all',this)">全店舗</button>
    <button class="ftab is-L" onclick="setFilter('L',this)">
      <img class="ftab-logo" src="https://linaria-cafe.com/img/logo-linaria.webp" alt="Linaria"
           onerror="this.style.display='none'">
      <span class="ftab-name">Linaria</span>
    </button>
    <button class="ftab is-M" onclick="setFilter('M',this)">
      <img class="ftab-logo" src="https://is-melty.jp/img/logo-ismelty.webp" alt="I's Melty"
           onerror="this.style.display='none'">
      <span class="ftab-name">I's Melty</span>
    </button>
    <button class="ftab is-Y" onclick="setFilter('Y',this)">
      <img class="ftab-logo" src="https://lily-maid.com/img/logo-lilymaid.webp" alt="Lily Maid"
           onerror="this.style.display='none'">
      <span class="ftab-name">Lily Maid</span>
    </button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="go(-1)" aria-label="前の期間">&#8249;</button>
    <span id="navLabel"></span>
    <button class="nav-btn" onclick="go(1)" aria-label="次の期間">&#8250;</button>
  </div>
</header>

<div id="todayPanel" class="today-panel">
  <div class="today-head">今日のお給仕</div>
  <div class="today-chips" id="todayChips"></div>
</div>

<div class="status-bar">
  <span class="sdot" id="sdot"></span>
  <span id="stxt">読み込み中…</span>
  <span id="supdated"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="dRow"><th>名前</th></tr>
      <tr id="wRow"><th></th></tr>
    </thead>
    <tbody id="tBody"></tbody>
  </table>
</div>

<button class="cmp-btn" id="cmpBtn" onclick="toggleCompact()">
  <span class="cmp-icon">⊞</span>コンパクト
</button>

<div class="bottom-section">
  <div class="ev-card">
    <div class="ev-head">◆ イベント情報</div>
    <ul id="evList"></ul>
  </div>
  <div class="legend">
    <div class="lg-item lg-L">
      <img class="lg-logo" src="https://linaria-cafe.com/img/logo-linaria.webp" alt="Linaria"
           onerror="this.style.display='none';this.insertAdjacentText('afterend','Linaria')">
    </div>
    <div class="lg-item lg-M">
      <img class="lg-logo" src="https://is-melty.jp/img/logo-ismelty.webp" alt="I's Melty"
           onerror="this.style.display='none';this.insertAdjacentText('afterend',&quot;I's Melty&quot;)">
    </div>

/* =====================================================
   STATE
===================================================== */
const WD   = ['日','月','火','水','木','金','土'];
const MO_J = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
let curPeriod, activeFilter='all';

function detectPeriod(){const n=new Date();return{y:n.getFullYear(),m:n.getMonth()+1,h:n.getDate()<=15?1:2}}
function periodKey(p){return p.y+'-'+p.m}
function periodLabel(p){return MO_J[p.m]+(p.h===1?' 前半（1〜15日）':' 後半（16〜末日）')}
function navLabel(p){return p.y+'/'+String(p.m).padStart(2,'0')+(p.h===1?' 前半':' 後半')}
function go(d){
  let{y,m,h}=curPeriod; h+=d;
  if(h>2){h=1;m++} if(h<1){h=2;m--}
  if(m>12){m=1;y++} if(m<1){m=12;y--}
  curPeriod={y,m,h}; loadAndRender(curPeriod);
}

/* =====================================================
   LOADER
===================================================== */
async function loadSheet(key){
  const[y,mo]=key.split('-');
  const month=y+'-'+mo.padStart(2,'0');
  const r=await fetch(CONFIG.PHP_URL+'?month='+month);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const data=await r.json();
  if(!Array.isArray(data)) throw new Error('invalid');
  return data;
}

function setStatus(cls,txt){
  document.getElementById('sdot').className='sdot '+cls;
  document.getElementById('stxt').textContent=txt;
  if(cls==='ok'){
    const n=new Date();
    document.getElementById('supdated').textContent=
      '更新 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  }
}

/* =====================================================
   TODAY PANEL
===================================================== */
function renderToday(allRows){
  const panel=document.getElementById('todayPanel');
  const chips=document.getElementById('todayChips');
  const now=new Date();
  const{y:py,m:pm}=curPeriod;
  if(now.getFullYear()!==py||now.getMonth()+1!==pm){panel.classList.remove('visible');return}
  const d=now.getDate();
  const today=allRows.filter(r=>r[1]===d);
  if(!today.length){panel.classList.remove('visible');return}
  chips.innerHTML='';
  const ORD={L:0,M:1,Y:2};
  today.sort((a,b)=>(ORD[a[2]]??9)-(ORD[b[2]]??9)||a[0].localeCompare(b[0],'ja'));
  today.forEach(([name,,store,time,photo,xid])=>{
    const chip=document.createElement('div');
    chip.className='tc tc-'+store;
    const initial=name.charAt(0);
    const img=photo
      ?`<img class="tc-photo" src="${CONFIG.PHOTO_BASE}${photo}" alt="${name}" onerror="this.outerHTML='<span class=\\'tc-nophoto\\'>${initial}</span>'">`
      :`<span class="tc-nophoto">${initial}</span>`;
    const nm=xid
      ?`<span class="tc-name"><a href="https://x.com/${xid}" target="_blank" rel="noopener">${name}</a></span>`
      :`<span class="tc-name">${name}</span>`;
    const slogo=CONFIG.STORE_LOGO[store]
      ?`<img class="tc-slogo" src="${CONFIG.STORE_LOGO[store]}" alt="" onerror="this.style.display='none'">`:'';
    chip.innerHTML=img+nm+`<span class="tc-time">${time}</span>`+slogo;
    chips.appendChild(chip);
  });
  panel.classList.add('visible');
}

/* =====================================================
   RENDER TABLE
===================================================== */
function render(period, allRows){
  const{y,m,h}=period;
  const daysInMonth=new Date(y,m,0).getDate();
  const startDay=h===1?1:16, endDay=h===1?15:daysInMonth;
  const todayD=(()=>{const n=new Date();return(n.getFullYear()===y&&n.getMonth()+1===m)?n.getDate():-1})();

  document.getElementById('titlePeriod').textContent=periodLabel(period);
  document.getElementById('navLabel').textContent=navLabel(period);
  document.title=MO_J[m]+(h===1?'前半':'後半')+' お給仕予定 | MS Group';

  const rows=allRows.filter(([,day])=>day>=startDay&&day<=endDay);

  /* ── Date header ── */
  const dRow=document.getElementById('dRow');
  const wRow=document.getElementById('wRow');
  while(dRow.children.length>1) dRow.removeChild(dRow.lastChild);
  wRow.innerHTML='<th></th>';

  for(let d=startDay;d<=endDay;d++){
    const w=new Date(y,m-1,d).getDay();
    const isT=d===todayD, isMon=w===1;
    const col=isT?' col-today':w===0?' col-sun':w===6?' col-sat':w===5?' col-fri':'';
    const sep=(isMon&&d>startDay)?' wk-sep':'';
    const th1=document.createElement('th');
    th1.className='th-date'+col+sep;
    th1.innerHTML='<div class="th-d">'+(isT?`<span>${d}</span>`:d)+'</div>';
    dRow.appendChild(th1);
    const th2=document.createElement('th');
    th2.className=col+sep;
    th2.innerHTML='<div class="th-w">'+WD[w]+'</div>';
    wRow.appendChild(th2);
  }

  /* ── Body ── */
  const tbody=document.getElementById('tBody');
  tbody.innerHTML='';
  const order=[], map=new Map(), meta={};
  rows.forEach(([name,day,store,time,photo,xid])=>{
    if(!map.has(name)){order.push(name);map.set(name,[])}
    map.get(name).push({day,store,time});
    if(!meta[name]) meta[name]={photo:photo||'',xid:xid||''};
  });

  order.forEach(name=>{
    const shifts=map.get(name);
    const stores=[...new Set(shifts.map(s=>s.store))];
    const tr=document.createElement('tr');
    tr.dataset.stores=stores.join(',');

    /* Name cell */
    const{photo,xid}=meta[name]||{};
    const nameTd=document.createElement('td');
    const initial=name.charAt(0);
    const img=photo
      ?`<img class="c-photo" src="${CONFIG.PHOTO_BASE}${photo}" alt="${name}" onerror="this.outerHTML='<span class=\\'c-nophoto\\'>${initial}</span>'">`
      :`<span class="c-nophoto">${initial}</span>`;
    const nm=xid
      ?`<span class="c-name"><a href="https://x.com/${xid}" target="_blank" rel="noopener">${name}</a></span>`
      :`<span class="c-name">${name}</span>`;
    nameTd.innerHTML=`<span class="cast-cell">${img}${nm}</span>`;
    tr.appendChild(nameTd);

    const dayMap={};
    shifts.forEach(s=>{dayMap[s.day]=s});

    for(let d=startDay;d<=endDay;d++){
      const w=new Date(y,m-1,d).getDay();
      const isT=d===todayD, isMon=w===1;
      const td=document.createElement('td');
      const rc=isT?'cd-today':w===5?'cd-fri':w===0?'cd-sun':w===6?'cd-sat':'';
      if(rc) td.className=rc;
      if(isMon&&d>startDay) td.classList.add('wk-sep');
      if(dayMap[d]){
        const s=dayMap[d];
        const sp=document.createElement('span');
        sp.className='shift shift-'+s.store;
        sp.dataset.store=s.store;
        sp.textContent=s.time;
        td.appendChild(sp);
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });

  /* ── Events ── */
  const evList=document.getElementById('evList');
  evList.innerHTML='';
  const evs=(CONFIG.EVENTS_BY_MONTH||{})[periodKey(period)]||[];
  if(!evs.length){
    evList.innerHTML='<li style="color:rgba(255,255,255,.22);font-size:11px">イベントなし</li>';
  } else {
    evs.forEach(({date,text})=>{
      const li=document.createElement('li');
      li.innerHTML=`<span class="ev-date">${date}</span>${text}`;
      evList.appendChild(li);
    });
  }

  applyFilter(activeFilter);
}

/* =====================================================
   FILTER
===================================================== */
function applyFilter(store){
  document.querySelectorAll('#tBody tr').forEach(tr=>{
    if(store==='all'){
      tr.classList.remove('rh');
      tr.querySelectorAll('.shift').forEach(s=>s.classList.remove('dm'));
    } else {
      const ss=tr.dataset.stores?tr.dataset.stores.split(','):[];
      ss.includes(store)?tr.classList.remove('rh'):tr.classList.add('rh');
      tr.querySelectorAll('.shift').forEach(s=>s.dataset.store===store?s.classList.remove('dm'):s.classList.add('dm'));
    }
  });
}
function setFilter(store,btn){
  activeFilter=store;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilter(store);
}

/* =====================================================
   LOAD + RENDER
===================================================== */
async function loadAndRender(period){
  setStatus('ld','読み込み中…');
  const key=periodKey(period);
  location.hash=period.y+'-'+period.m+'-'+period.h;
  try{
    const rows=await loadSheet(key);
    render(period,rows);
    renderToday(rows);
    setStatus('ok','シフト反映済み');
  } catch(e){
    console.warn(e);
    const sample=SAMPLE[key]||[];
    render(period,sample);
    renderToday(sample);
    setStatus('err','サンプルデータ表示中');
  }
}

/* =====================================================
   COMPACT MODE
===================================================== */
function toggleCompact(){
  const on=document.body.classList.toggle('compact');
  const btn=document.getElementById('cmpBtn');
  btn.classList.toggle('on',on);
  btn.innerHTML=on
    ?'<span class="cmp-icon">⊟</span>通常表示'
    :'<span class="cmp-icon">⊞</span>コンパクト';
}

/* =====================================================
   INIT
===================================================== */
function periodFromHash(){
  const h=location.hash.replace('#','');
  const m=h.match(/^(\d{4})-(\d{1,2})-([12])$/);
  return m?{y:+m[1],m:+m[2],h:+m[3]}:null;
}
curPeriod=periodFromHash()||detectPeriod();
loadAndRender(curPeriod);
setInterval(()=>loadAndRender(curPeriod),5*60*1000);
