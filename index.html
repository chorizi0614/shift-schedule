<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お給仕予定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}

/* ===== BRAND COLORS ===== */
:root{
  --L: #5bc8e8;
  --L-bg: #051828;
  --L-dim: rgba(91,200,232,.18);
  --M: #e840a0;
  --M-bg: #130410;
  --M-dim: rgba(232,64,160,.18);
  --Y: #d4a800;
  --Y-bg: #0b0900;
  --Y-dim: rgba(212,168,0,.18);
  --page: #08061a;
  --surface: #0e0c22;
  --surface2: #13112a;
  --border: rgba(255,255,255,.07);
  --text: rgba(255,255,255,.85);
  --muted: rgba(255,255,255,.38);
  --today-col: rgba(255,220,80,.07);
  --sat-col: rgba(80,160,255,.07);
  --sun-col: rgba(255,80,80,.07);
  --fri-col: rgba(200,255,100,.05);
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--page);
  color:var(--text);
  min-height:100dvh;
  overflow-x:hidden;
}

/* ===== HEADER (sticky) ===== */
header{
  position:sticky;
  top:0;
  z-index:200;
  background:var(--page);
}

/* Title band */
.title-band{
  background:linear-gradient(160deg,#08041a 0%,#100720 55%,#0a0518 100%);
  padding:14px 16px 10px;
  text-align:center;
  border-bottom:1px solid rgba(160,80,255,.12);
}
.title-main{
  font-family:'Shippori Mincho B1',serif;
  font-size:24px;
  font-weight:800;
  color:rgba(255,255,255,.93);
  letter-spacing:7px;
  text-shadow:0 0 40px rgba(180,100,255,.3),0 1px 8px rgba(0,0,0,.8);
}
.title-period{
  font-size:11px;
  color:rgba(180,130,255,.5);
  letter-spacing:2px;
  margin-top:4px;
}

/* Filter tabs */
.filter-row{
  display:flex;
  background:#0a0818;
  padding:6px 8px;
  gap:5px;
  border-bottom:1px solid var(--border);
}
.ftab{
  flex:1;
  padding:7px 2px;
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:20px;
  font-size:11px;
  font-family:'Noto Sans JP',sans-serif;
  font-weight:700;
  background:transparent;
  cursor:pointer;
  white-space:nowrap;
  color:rgba(255,255,255,.45);
  transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.ftab.is-all.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.45);color:#fff}
.ftab.is-L{color:var(--L);border-color:rgba(91,200,232,.25)}
.ftab.is-L.active{background:var(--L-dim);border-color:var(--L)}
.ftab.is-M{color:var(--M);border-color:rgba(232,64,160,.25)}
.ftab.is-M.active{background:var(--M-dim);border-color:var(--M)}
.ftab.is-Y{color:var(--Y);border-color:rgba(212,168,0,.25)}
.ftab.is-Y.active{background:var(--Y-dim);border-color:var(--Y)}

/* Period navigation */
.nav-row{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#080614;
  padding:7px 12px;
  gap:14px;
  border-bottom:1px solid var(--border);
}
.nav-btn{
  width:34px;height:34px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:50%;
  background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.75);
  font-size:20px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
}
.nav-btn:active{background:rgba(255,255,255,.12)}
#navLabel{
  font-size:14px;
  font-weight:700;
  color:rgba(255,255,255,.85);
  letter-spacing:1px;
  min-width:130px;
  text-align:center;
}

/* Status */
.status-bar{
  display:flex;
  align-items:center;
  gap:6px;
  padding:5px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  min-height:26px;
}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sdot.ok{background:#4caf50}
.sdot.ld{background:#2196f3;animation:pulse .9s infinite}
.sdot.err{background:#f44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#stxt{font-size:10px;color:var(--muted)}

/* ===== TABLE ===== */
.table-wrap{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  background:var(--surface);
}
.table-wrap::-webkit-scrollbar{height:3px}
.table-wrap::-webkit-scrollbar-track{background:transparent}
.table-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:2px}

table{
  border-collapse:collapse;
  white-space:nowrap;
  width:100%;
}

/* Sticky name column */
thead th:first-child,
tbody td:first-child{
  position:sticky;
  left:0;
  z-index:10;
  background:var(--surface);
}
thead th:first-child{background:#0e0c22;z-index:11}

/* Header rows */
thead th{
  padding:0;
  border-bottom:1px solid var(--border);
  font-weight:400;
}
#dRow th:first-child{
  min-width:58px;
  max-width:58px;
  padding:0 4px;
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  vertical-align:middle;
  border-right:1px solid var(--border);
  text-align:center;
  height:24px;
}
#wRow th:first-child{
  border-right:1px solid var(--border);
  height:18px;
}

.th-date{
  min-width:36px;
  width:36px;
}
.th-d{
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:rgba(255,255,255,.65);
}
.th-w{
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:9px;
  color:rgba(255,255,255,.3);
}

/* Day column color classes */
.col-sun .th-d,.col-sun .th-w{color:rgba(255,100,100,.8)}
.col-sat .th-d,.col-sat .th-w{color:rgba(100,160,255,.8)}
.col-fri .th-d,.col-fri .th-w{color:rgba(180,255,100,.7)}
.col-today .th-d{
  color:#fff;
  font-weight:700;
}
.col-today .th-d > span{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;height:22px;
  border-radius:50%;
  background:rgba(255,220,80,.3);
  border:1px solid rgba(255,220,80,.6);
}

/* Week separator */
.wk-sep{
  border-left:1.5px dashed rgba(120,80,200,.2) !important;
}

/* Body rows */
tbody tr{
  border-bottom:1px solid rgba(255,255,255,.04);
  transition:opacity .15s;
}
tbody tr.rh{display:none}
tbody td:first-child{
  padding:0 6px 0 8px;
  font-size:12px;
  font-weight:500;
  color:rgba(255,255,255,.8);
  height:38px;
  min-width:58px;
  max-width:58px;
  overflow:hidden;
  text-overflow:ellipsis;
  border-right:1px solid var(--border);
}
tbody td{
  padding:2px 1px;
  text-align:center;
  vertical-align:middle;
  height:38px;
}
/* row day colors */
tbody td.cd-today{background:var(--today-col)}
tbody td.cd-sat{background:var(--sat-col)}
tbody td.cd-sun{background:var(--sun-col)}
tbody td.cd-fri{background:var(--fri-col)}

/* Shift badge */
.shift{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  padding:2px 5px;
  font-size:10px;
  font-weight:700;
  letter-spacing:0;
  white-space:nowrap;
  min-width:30px;
}
.shift.dm{opacity:.18}
.shift-L{background:rgba(91,200,232,.18);color:var(--L);border:1px solid rgba(91,200,232,.35)}
.shift-M{background:rgba(232,64,160,.18);color:var(--M);border:1px solid rgba(232,64,160,.35)}
.shift-Y{background:rgba(212,168,0,.18);color:var(--Y);border:1px solid rgba(212,168,0,.35)}

/* ===== BOTTOM SECTION ===== */
.bottom-section{
  padding:16px 14px 32px;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* Event card */
.ev-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 14px;
}
.ev-head{
  font-family:'Shippori Mincho B1',serif;
  font-size:13px;
  font-weight:700;
  color:rgba(200,150,255,.7);
  margin-bottom:8px;
  letter-spacing:2px;
}
#evList{list-style:none;display:flex;flex-direction:column;gap:6px}
#evList li{
  font-size:12px;
  color:var(--text);
  display:flex;
  gap:8px;
  align-items:baseline;
}
.ev-date{
  color:rgba(200,150,255,.7);
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
}

/* Legend */
.legend{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}
.lg-item{
  display:flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  color:var(--muted);
}

/* ===== DESKTOP override ===== */
@media(min-width:640px){
  .title-main{font-size:30px;letter-spacing:9px}
  .filter-row{padding:8px 16px;gap:8px}
  .ftab{font-size:13px;padding:8px 12px}
  #navLabel{font-size:15px}
  .th-date{min-width:44px;width:44px}
  .th-d{font-size:13px;height:28px}
  .th-w{font-size:11px;height:20px}
  tbody td:first-child{min-width:80px;max-width:80px;font-size:13px;height:42px}
  tbody td{height:42px}
  .shift{font-size:11px;padding:3px 7px;min-width:38px}
  .bottom-section{flex-direction:row;flex-wrap:wrap}
  .ev-card{flex:1;min-width:240px}
  .legend{flex:1;justify-content:flex-end}
}
</style>
</head>
<body>

<header>
  <div class="title-band">
    <div class="title-main">お給仕予定</div>
    <div class="title-period" id="titlePeriod"></div>
  </div>
  <div class="filter-row">
    <button class="ftab is-all active" onclick="setFilter('all',this)">全店舗</button>
    <button class="ftab is-L" onclick="setFilter('L',this)">Linaria</button>
    <button class="ftab is-M" onclick="setFilter('M',this)">I's Melty</button>
    <button class="ftab is-Y" onclick="setFilter('Y',this)">Lily Maid</button>
  </div>
  <div class="nav-row">
    <button class="nav-btn" onclick="go(-1)" aria-label="前の期間">&#8249;</button>
    <span id="navLabel"></span>
    <button class="nav-btn" onclick="go(1)" aria-label="次の期間">&#8250;</button>
  </div>
</header>

<div class="status-bar">
  <span class="sdot" id="sdot"></span>
  <span id="stxt">読み込み中…</span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="dRow"><th>名前</th></tr>
      <tr id="wRow"><th></th></tr>
    </thead>
    <tbody id="tBody"></tbody>
  </table>
</div>

<div class="bottom-section">
  <div class="ev-card">
    <div class="ev-head">&#9670; イベント情報</div>
    <ul id="evList"></ul>
  </div>
  <div class="legend">
    <div class="lg-item">
      <span class="shift shift-L" style="min-width:auto;padding:2px 6px">&#9632;</span>Linaria
    </div>
    <div class="lg-item">
      <span class="shift shift-M" style="min-width:auto;padding:2px 6px">&#9632;</span>I's Melty
    </div>
    <div class="lg-item">
      <span class="shift shift-Y" style="min-width:auto;padding:2px 6px">&#9632;</span>Lily Maid
    </div>
  </div>
</div>

<script>
/* =====================================================
   CONFIG — Google Sheets ID をここに貼り付ける
===================================================== */
const CONFIG = {
  SHEET_ID: '',

  // イベント情報（月ごと）
  EVENTS_BY_MONTH: {
    '2026-6': [
      { date: '6月6日',  text: 'あっと 誕生祭' },
      { date: '6月13日', text: 'あっと 誕生祭' },
    ],
  },

  DEFAULT_PERIOD: null, // null = 今日の前半/後半を自動検出
};

/* =====================================================
   SAMPLE DATA  key='YYYY-M'  [名前, 日, 店舗, 時間]
===================================================== */
const SAMPLE = {
  '2026-6': [
    ['あっこ',3,'L','18-L'],['あっこ',4,'L','18-L'],['あっこ',5,'M','20-L'],
    ['あっこ',9,'L','18-L'],['あっこ',10,'L','18-L'],['あっこ',12,'L','18-L'],['あっこ',15,'L','18-L'],
    ['りり',2,'M','18-23'],['りり',5,'M','19-24'],['りり',6,'M','19-24'],
    ['りり',9,'M','18-23'],['りり',12,'M','19-24'],['りり',13,'M','19-24'],
    ['はお',1,'L','19-23'],['はお',2,'L','20-23'],['はお',5,'L','18-23'],
    ['はお',6,'L','18-L'],['はお',9,'L','20-23'],['はお',10,'L','18-22'],
    ['はお',11,'L','19-23'],['はお',12,'L','18-23'],['はお',13,'L','18-L'],
    ['なこ',1,'L','18-L'],['なこ',3,'L','18-L'],['なこ',5,'L','18-L'],
    ['なこ',6,'L','18-L'],['なこ',7,'L','18-L'],['なこ',9,'L','18-L'],
    ['なこ',11,'L','18-L'],['なこ',12,'L','18-L'],['なこ',13,'L','18-L'],
    ['なこ',14,'L','18-L'],['なこ',15,'L','18-L'],
    ['ねむち',5,'L','18-L'],['ねむち',12,'L','18-L'],['ねむち',13,'L','18-L'],
    ['める',2,'M','18-23'],['める',3,'M','18-23'],['める',5,'M','18-L'],
    ['める',6,'M','18-L'],['める',8,'M','18-23'],['める',10,'M','18-23'],
    ['める',11,'M','18-23'],['める',12,'M','18-L'],['める',13,'M','18-L'],
    ['しゅらん',1,'Y','18-24'],['しゅらん',3,'Y','18-24'],['しゅらん',6,'Y','18-L'],
    ['しゅらん',8,'Y','18-24'],['しゅらん',11,'Y','18-24'],['しゅらん',13,'Y','18-23.5'],['しゅらん',15,'Y','18-24'],
    ['ろん',5,'M','18-L'],['ろん',6,'Y','18-23.5'],
    ['ろん',2,'L','18-23'],['ろん',9,'L','18-23'],['ろん',12,'L','18-L'],
    ['あっこ',16,'L','18-23'],['あっこ',18,'L','18-23'],['あっこ',20,'L','18-23'],
    ['あっこ',21,'L','18-23'],['あっこ',23,'L','18-L'],['あっこ',25,'L','18-L'],
    ['りり',16,'M','18-23'],['りり',19,'M','19-24'],['りり',20,'M','19-24'],
    ['りり',23,'M','18-23'],['りり',26,'M','19-24'],['りり',27,'M','19-24'],
    ['はお',16,'L','20-23'],['はお',18,'L','18-22'],
    ['はお',19,'L','19-23'],['はお',20,'L','18-23'],['はお',21,'L','18-23'],
    ['はお',23,'L','18-23'],['はお',25,'L','18-L'],
    ['なこ',16,'L','18-L'],['なこ',17,'L','18-L'],['なこ',19,'L','18-L'],
    ['なこ',20,'L','18-L'],['なこ',21,'L','18-23'],
    ['なこ',23,'L','18-23'],['なこ',25,'L','18-L'],['なこ',27,'L','18-L'],
    ['める',16,'M','18-23'],['める',17,'M','18-23'],['める',19,'M','18-23'],
    ['める',20,'M','18-23'],['める',22,'M','18-23'],
    ['める',24,'M','18-23'],['める',25,'M','18-23'],['める',27,'M','18-23'],
    ['しゅらん',17,'Y','18-24'],['しゅらん',20,'Y','18-24'],['しゅらん',22,'Y','18-23.5'],
    ['しゅらん',24,'Y','18-24'],['しゅらん',27,'Y','18-24'],['しゅらん',29,'Y','18-24'],
    ['うに',16,'L','18-23'],['うに',17,'L','18-23'],['うに',19,'L','18-23'],['うに',20,'L','18-23'],
    ['うに',22,'L','18-23'],['うに',23,'L','18-23'],
    ['えま',16,'L','19-L'],['えま',18,'L','18-L'],['えま',19,'L','18-L'],
    ['えま',20,'L','18-L'],['えま',21,'L','18-L'],['えま',22,'L','18-23'],
    ['えま',23,'L','18-23'],['えま',25,'L','18-L'],
    ['かのの',17,'L','18-24'],['かのの',18,'L','18-23'],
    ['かのの',22,'L','19-24'],['かのの',25,'L','18-23'],
    ['しゃる',17,'M','18-23'],['しゃる',23,'M','18-23'],
    ['めう',21,'L','18-L'],['めう',23,'L','18-L'],['めう',25,'L','18-L'],
  ]
};

/* =====================================================
   STATE
===================================================== */
const WD   = ['日','月','火','水','木','金','土'];
const MO_J = ['','1月','2月','3月','4月','5月','6月',
               '7月','8月','9月','10月','11月','12月'];

// Period = { y:number, m:number, h:1|2 }  h=1:前半 h=2:後半
let curPeriod;
let activeFilter = 'all';

function detectPeriod() {
  const n = new Date();
  return { y: n.getFullYear(), m: n.getMonth()+1, h: n.getDate() <= 15 ? 1 : 2 };
}

function periodKey(p) { return p.y + '-' + p.m; }

function periodLabel(p) {
  return MO_J[p.m] + (p.h === 1 ? ' 前半（1〜15日）' : ' 後半（16〜末日）');
}

function navLabel(p) {
  const pad = String(p.m).padStart(2,'0');
  return p.y + '/' + pad + ' ' + (p.h === 1 ? '前半' : '後半');
}

function go(delta) {
  let { y, m, h } = curPeriod;
  h += delta;
  if (h > 2) { h = 1; m++; }
  if (h < 1) { h = 2; m--; }
  if (m > 12) { m = 1; y++; }
  if (m < 1)  { m = 12; y--; }
  curPeriod = { y, m, h };
  loadAndRender(curPeriod);
}

/* =====================================================
   SHEET LOADER
===================================================== */
async function loadSheet(key) {
  if (!CONFIG.SHEET_ID) return null;
  const url = 'https://docs.google.com/spreadsheets/d/' + CONFIG.SHEET_ID + '/pub?output=csv';
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const txt = await r.text();
  const MAP = { linaria:'L', melty:'M', lily:'Y', l:'L', m:'M', y:'Y' };
  return txt.trim().split('\n').slice(1).map(line => {
    const [name,dayStr,store,time] = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
    const day = parseInt(dayStr,10);
    const s   = MAP[store ? store.toLowerCase().split(' ')[0] : ''] || store.toUpperCase();
    if (!name || !day || !s || !time) return null;
    return [name, day, s, time];
  }).filter(Boolean);
}

function setStatus(cls, txt) {
  document.getElementById('sdot').className = 'sdot ' + cls;
  document.getElementById('stxt').textContent = txt;
}

/* =====================================================
   RENDER
===================================================== */
function render(period, allRows) {
  const { y, m, h } = period;
  const daysInMonth = new Date(y, m, 0).getDate();
  const startDay = h === 1 ?  1 : 16;
  const endDay   = h === 1 ? 15 : daysInMonth;
  const todayD   = (() => {
    const n = new Date();
    return (n.getFullYear()===y && n.getMonth()+1===m) ? n.getDate() : -1;
  })();

  // Labels
  document.getElementById('titlePeriod').textContent = periodLabel(period);
  document.getElementById('navLabel').textContent    = navLabel(period);
  document.title = MO_J[m] + (h===1 ? '前半' : '後半') + ' お給仕予定';

  // Filter rows to this half
  const rows = allRows.filter(([,,, ]) => true)
    .filter(([, day]) => day >= startDay && day <= endDay);

  // Build date header
  const dRow = document.getElementById('dRow');
  const wRow = document.getElementById('wRow');
  while (dRow.children.length > 1) dRow.removeChild(dRow.lastChild);
  wRow.innerHTML = '<th></th>';

  for (let d = startDay; d <= endDay; d++) {
    const w   = new Date(y, m-1, d).getDay();
    const isT = d === todayD;
    const isMon = w === 1;
    const colCls =
      isT       ? ' col-today' :
      w === 0   ? ' col-sun'   :
      w === 6   ? ' col-sat'   :
      w === 5   ? ' col-fri'   : '';
    const sepCls = (isMon && d > startDay) ? ' wk-sep' : '';

    const th1 = document.createElement('th');
    th1.className = 'th-date' + colCls + sepCls;
    th1.innerHTML = '<div class="th-d">' + (isT ? '<span>' + d + '</span>' : d) + '</div>';
    dRow.appendChild(th1);

    const th2 = document.createElement('th');
    th2.className = colCls + sepCls;
    th2.innerHTML = '<div class="th-w">' + WD[w] + '</div>';
    wRow.appendChild(th2);
  }

  // Build body
  const tbody = document.getElementById('tBody');
  tbody.innerHTML = '';

  // Group by staff name, preserve order
  const staffOrder = [];
  const staffMap = new Map();
  rows.forEach(([name, day, store, time]) => {
    if (!staffMap.has(name)) { staffOrder.push(name); staffMap.set(name, []); }
    staffMap.get(name).push({ day, store, time });
  });

  staffOrder.forEach(name => {
    const shifts = staffMap.get(name);
    const stores = [...new Set(shifts.map(s => s.store))];
    const tr = document.createElement('tr');
    tr.dataset.stores = stores.join(',');

    const nameTd = document.createElement('td');
    nameTd.textContent = name;
    tr.appendChild(nameTd);

    const dayMap = {};
    shifts.forEach(s => { dayMap[s.day] = s; });

    for (let d = startDay; d <= endDay; d++) {
      const w    = new Date(y, m-1, d).getDay();
      const isT  = d === todayD;
      const isMon= w === 1;
      const td   = document.createElement('td');
      const rowCls = isT ? 'cd-today' : w===5 ? 'cd-fri' : w===0 ? 'cd-sun' : w===6 ? 'cd-sat' : '';
      if (rowCls) td.className = rowCls;
      if (isMon && d > startDay) td.classList.add('wk-sep');
      if (dayMap[d]) {
        const s    = dayMap[d];
        const span = document.createElement('span');
        span.className   = 'shift shift-' + s.store;
        span.dataset.store = s.store;
        span.textContent = s.time;
        td.appendChild(span);
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });

  // Events
  const evList = document.getElementById('evList');
  evList.innerHTML = '';
  const evKey = p => p.y + '-' + p.m;
  const evs = (CONFIG.EVENTS_BY_MONTH && CONFIG.EVENTS_BY_MONTH[evKey(period)]) || [];
  if (evs.length === 0) {
    evList.innerHTML = '<li style="color:rgba(255,255,255,.25);font-size:11px">イベントなし</li>';
  } else {
    evs.forEach(({ date, text }) => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="ev-date">' + date + '</span>' + text;
      evList.appendChild(li);
    });
  }

  applyFilter(activeFilter);
}

/* =====================================================
   FILTER
===================================================== */
function applyFilter(store) {
  document.querySelectorAll('#tBody tr').forEach(tr => {
    if (store === 'all') {
      tr.classList.remove('rh');
      tr.querySelectorAll('.shift').forEach(s => s.classList.remove('dm'));
    } else {
      const ss = tr.dataset.stores ? tr.dataset.stores.split(',') : [];
      ss.includes(store) ? tr.classList.remove('rh') : tr.classList.add('rh');
      tr.querySelectorAll('.shift').forEach(s => {
        s.dataset.store === store ? s.classList.remove('dm') : s.classList.add('dm');
      });
    }
  });
}

function setFilter(store, btn) {
  activeFilter = store;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilter(store);
}

/* =====================================================
   LOAD + RENDER
===================================================== */
async function loadAndRender(period) {
  setStatus('ld', '読み込み中…');
  try {
    const key  = periodKey(period);
    let rows   = await loadSheet(key);
    if (rows) {
      render(period, rows);
      setStatus('ok', rows.length + '件 読み込み完了');
    } else {
      const sample = SAMPLE[key] || [];
      render(period, sample);
      setStatus('', sample.length ? 'サンプルデータ表示中' : 'データなし');
    }
  } catch(e) {
    console.error(e);
    const key    = periodKey(period);
    const sample = SAMPLE[key] || [];
    render(period, sample);
    setStatus('err', 'スプレッドシート読込失敗（サンプル表示中）');
  }
}

/* =====================================================
   INIT
===================================================== */
curPeriod = CONFIG.DEFAULT_PERIOD || detectPeriod();
loadAndRender(curPeriod);
</script>
